<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#070d1f;color:#e8f0ff;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:0 16px 80px}
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid #121e3d}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:1.6rem;font-weight:800;color:#2d7dd2;letter-spacing:.5px}
.logo span{color:#e8f0ff}
.user-pill{display:flex;align-items:center;gap:10px;background:#0d1a35;border-radius:999px;padding:6px 14px 6px 10px;font-size:.82rem;color:#8ab0d4}
.dot{width:8px;height:8px;border-radius:50%;background:#2d7dd2}
.btn-logout{background:none;border:1px solid #1a2d50;color:#8ab0d4;border-radius:6px;padding:4px 10px;font-size:.78rem;cursor:pointer}
.btn-logout:hover{border-color:#2d7dd2;color:#2d7dd2}
.tabs{display:flex;gap:4px;padding:16px 0 0}
.tab{background:none;border:none;padding:8px 18px;border-radius:8px 8px 0 0;font-size:.88rem;font-weight:600;color:#4a6a8a;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#2d7dd2;border-bottom-color:#2d7dd2}
.date-strip{display:flex;gap:8px;overflow-x:auto;padding:16px 0 8px;scrollbar-width:none}
.date-strip::-webkit-scrollbar{display:none}
.date-btn{flex-shrink:0;background:#0d1a35;border:1px solid #1a2d50;border-radius:10px;padding:8px 14px;cursor:pointer;text-align:center}
.date-btn .day-name{font-size:.68rem;text-transform:uppercase;letter-spacing:1px;color:#4a6a8a;font-weight:600}
.date-btn .day-num{font-family:'Barlow Condensed',sans-serif;font-size:1.3rem;font-weight:800;color:#8ab0d4;line-height:1.1}
.date-btn.active{background:#2d7dd2;border-color:#2d7dd2}
.date-btn.active .day-name,.date-btn.active .day-num{color:#070d1f}
.slot-toggle{display:flex;gap:8px;margin:12px 0}
.slot-btn{flex:1;padding:10px;border:1px solid #1a2d50;border-radius:8px;background:#0d1a35;color:#4a6a8a;font-size:.88rem;font-weight:600;cursor:pointer}
.slot-btn.active{background:#0d2a4d;border-color:#2d7dd2;color:#2d7dd2}
.table-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-top:8px}
.table-card{border-radius:14px;padding:18px 16px;border:1.5px solid #1a2d50;transition:all .2s;position:relative}
.table-card.free{background:#070d1f;border-color:#1a3d7a;cursor:pointer}
.table-card.free:hover{border-color:#2d7dd2;transform:translateY(-2px);box-shadow:0 8px 24px #2d7dd222}
.table-card.pending{background:#1a2208;border-color:#6b7c14}

<script type="text/babel">
const {useState,useEffect,useCallback}=React;

const BIN_ID="6a4ba2c3da38895dfe34fd25";
const API_KEY="$2a$10$Dsd10Ss03WuXZKAwXqVyAO/82xnFc6gAy/Ulugmgdyp9h4ajp20aK";
const BASE_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const TABLES=[1,2,3,4,5];
const SLOTS=["17:00–18:30","18:30–20:00"];
const ADMIN_CODE="TTV";
const DEFAULT_ADMIN={id:"admin-alessandro",name:"Alessandro",email:"alessandro.chellini7@gmail.com",password:"Tacchino",isAdmin:true};

async function fetchData(){
  const r=await fetch(BASE_URL+"/latest",{headers:{"X-Master-Key":API_KEY}});
  const j=await r.json();
  return j.record;
}

async function saveData(data){
  await fetch(BASE_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},body:JSON.stringify(data)});
}

function getUpcomingDates(){
  const dates=[];const today=new Date();today.setHours(0,0,0,0);
  let d=new Date(today);
  while(dates.length<12){const dow=d.getDay();if(dow===1||dow===3||dow===5)dates.push(new Date(d));d.setDate(d.getDate()+1);}
  return dates;
}
function formatDate(date){return date.toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"2-digit",year:"numeric"});}
function dateKey(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,'0');
  const d=String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

  const [data,setData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [saving,setSaving]=useState(false);
  const [currentUser,setCurrentUser]=useState(null);
  const [tab,setTab]=useState("prenota");
  const [selectedDate,setSelectedDate]=useState(0);
  const [selectedSlot,setSelectedSlot]=useState(0);
  const [modal,setModal]=useState(null);
  const [inviteMode,setInviteMode]=useState("open");
  const [inviteTarget,setInviteTarget]=useState("");
  const [externalName,setExternalName]=useState("");

  const [editName,setEditName]=useState("");
  const [editPhoto,setEditPhoto]=useState("");

  const [authError,setAuthError]=useState("");
  const dates=getUpcomingDates();

  useEffect(()=>{
    const cu=localStorage.getItem("tt_currentUser");
    if(cu)setCurrentUser(JSON.parse(cu));
    fetchData().then(d=>{
      if(!d.users)d.users=[];
      if(!d.bookings)d.bookings=[];
      if(!d.users.find(u=>u.id===DEFAULT_ADMIN.id)){
        d.users=[DEFAULT_ADMIN,...d.users];
        saveData(d);
      }
      setData(d);
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[]);

  const updateData=async(newData)=>{
    setSaving(true);
    setData(newData);
    await saveData(newData);
    setSaving(false);
  };

  const users=data?.users||[];
  const bookings=data?.bookings||[];

  const handleAuth=async()=>{
    setAuthError("");
    if(authMode==="register"){
      if(!form.name.trim()||!form.email.trim()||!form.password.trim()){setAuthError("Compila tutti i campi.");return;}
      if(users.find(u=>u.email===form.email.trim().toLowerCase())){setAuthError("Email già registrata.");return;}
      const isAdmin=form.adminCode===ADMIN_CODE;
      const newUser={id:Date.now().toString(),name:form.name.trim(),email:form.email.trim().toLowerCase(),password:form.password,isAdmin};
      const newData={...data,users:[...users,newUser]};
      await updateData(newData);
      localStorage.setItem("tt_currentUser",JSON.stringify(newUser));
      setCurrentUser(newUser);
    }else{
      const found=users.find(u=>u.email===form.email.trim().toLowerCase()&&u.password===form.password);
      if(!found){setAuthError("Email o password errati.");return;}
      localStorage.setItem("tt_currentUser",JSON.stringify(found));
      setCurrentUser(found);
    }
  };

  const handleLogout=()=>{localStorage.removeItem("tt_currentUser");setCurrentUser(null);setTab("prenota");};

  const handlePhotoUpload=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>setEditPhoto(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleSaveProfile=async()=>{
    if(!editName.trim())return;
    const updatedUser={...currentUser,name:editName.trim(),photo:editPhoto||currentUser.photo||null};
    const newUsers=users.map(u=>u.id===currentUser.id?updatedUser:u);
    const newData={...data,users:newUsers};
    await updateData(newData);
    localStorage.setItem("tt_currentUser",JSON.stringify(updatedUser));
    setCurrentUser(updatedUser);
    setData(newData);
    setProfileModal(false);
  };
  const getBooking=(t,d,s)=>bookings.find(b=>b.table===t&&b.date===d&&b.slot===s);
  const getUserName=id=>{if(!id)return null;const u=users.find(x=>x.id===id);return u?u.name:"Utente";};

  const handleBook=async()=>{
    const dateStr=dateKey(dates[selectedDate]);
    if(getBooking(modal.tableNum,dateStr,selectedSlot))return;
    const nb={id:Date.now().toString(),table:modal.tableNum,date:dateStr,slot:selectedSlot,player1:currentUser.id,player2:inviteMode==="specific"&&inviteTarget?inviteTarget:null,externalPartner:inviteMode==="external"&&externalName.trim()?externalName.trim():null,status:inviteMode==="external"&&externalName.trim()?"confirmed":"pending",openInvite:inviteMode==="open"};
    await updateData({...data,bookings:[...bookings,nb]});
    setModal(null);setInviteMode("open");setInviteTarget("");setExternalName("");
  };

  const handleJoin=async(bk)=>{
    const newBookings=bookings.map(b=>b.id===bk.id?{...b,player2:currentUser.id,status:"confirmed",openInvite:false}:b);
    await updateData({...data,bookings:newBookings});
  };

  const handleCancel=async(bookingId)=>{
    const b=bookings.find(x=>x.id===bookingId);if(!b)return;
    let newBookings;
    if(b.player2===currentUser.id){newBookings=bookings.map(x=>x.id===bookingId?{...x,player2:null,status:"pending",openInvite:true}:x);}
    else{newBookings=bookings.filter(x=>x.id!==bookingId);}
    await updateData({...data,bookings:newBookings});
  };

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div className="user-pill" onClick={()=>{setEditName(currentUser.name);setEditPhoto(currentUser.photo||"");setProfileModal(true);}} style={{cursor:"pointer"}}>
            {currentUser.photo?<img src={currentUser.photo} style={{width:24,height:24,borderRadius:"50%",objectFit:"cover"}}/>:<div className="dot"/>}
            {currentUser.name}{currentUser.isAdmin&&<span style={{fontSize:".7rem",color:"#c9d11c"}}>★ Admin</span>}
            <span style={{fontSize:".7rem",color:"#4a6a8a"}}>✏️</span>
          </div>

        </div>

      <div className="tabs">
        <button className={`tab ${tab==="prenota"?"active":""}`} onClick={()=>setTab("prenota")}>Prenota</button>
        <button className={`tab ${tab==="miei"?"active":""}`} onClick={()=>setTab("miei")}>Le mie</button>
        <button className={`tab ${tab==="giocatori"?"active":""}`} onClick={()=>setTab("giocatori")}>Giocatori</button>
        {currentUser.isAdmin&&<button className={`tab ${tab==="admin"?"active":""}`} onClick={()=>setTab("admin")}>Admin</button>}
      </div>

      {tab==="prenota"&&<>
        <div className="date-strip">
          {dates.map((d,i)=>(
            <button key={i} className={`date-btn ${selectedDate===i?"active":""}`} onClick={()=>setSelectedDate(i)}>
              <div className="day-name">{d.toLocaleDateString("it-IT",{weekday:"short"})}</div>
              <div className="day-num">{d.getDate()}/{d.getMonth()+1}</div>
            </button>
          ))}
        </div>
        <div className="slot-toggle">
          {SLOTS.map((s,i)=><button key={i} className={`slot-btn ${selectedSlot===i?"active":""}`} onClick={()=>setSelectedSlot(i)}>{s}</button>)}
        </div>
        <div className="section-title">Tavoli — {formatDate(dates[selectedDate])} — {SLOTS[selectedSlot]}</div>
        <div className="table-grid">
          {TABLES.map(tableNum=>{
            const bk=getBooking(tableNum,dateStr,selectedSlot);
            const isMine=bk&&(bk.player1===currentUser.id||bk.player2===currentUser.id);
            const canJoin=bk&&bk.status==="pending"&&bk.openInvite&&!isMine;
            let state="free";
            if(bk){if(isMine)state="mine";else if(bk.status==="confirmed")state="full";else state="pending";}
            const labels={free:"Libero",pending:"In attesa",full:"Occupato",mine:"Mia prenotaz."};
            return(
              <div key={tableNum} className={`table-card ${state}`} onClick={state==="free"?()=>setModal({tableNum}):undefined}>
                {state==="pending"&&<div className="pending-badge">1/2</div>}
                <div className="table-num">{tableNum}</div>
                <div className="table-label">Tavolo {tableNum} · {labels[state]}</div>
                {bk&&<div className="table-players">
                  <span className="name">{getUserName(bk.player1)}</span>
                  {bk.player2?<><br/><span className="name">{getUserName(bk.player2)}</span></>
                  :bk.externalPartner?<><br/><span className="name">{bk.externalPartner}</span><br/><span style={{fontSize:".7rem",color:"#6b7c14"}}>Ospite esterno</span></>
                  :bk.openInvite?<><br/><span style={{color:"#4a6a8a"}}>Posto aperto</span></>
                  :<><br/><span style={{color:"#4a6a8a"}}>In attesa risposta</span></>}
                </div>}
                {state==="free"&&<button className="btn-book">+ Prenota</button>}
                {canJoin&&<button className="btn-book" onClick={e=>{e.stopPropagation();handleJoin(bk);}}>Unisciti</button>}
                {isMine&&<button className="btn-cancel" onClick={e=>{e.stopPropagation();handleCancel(bk.id);}}>Cancella</button>}
              </div>
            );
          })}
        </div>
      </>}

      {tab==="miei"&&<div className="admin-section">
        <h3>Le mie prenotazioni</h3>
        {myBookings.length===0?<div className="empty-state">Nessuna prenotazione ancora.</div>:
        <div className="my-bookings-list">
          {myBookings.map(b=>{
            const d=new Date(b.date+"T12:00:00");
            const partner=b.player1===currentUser.id?b.player2:b.player1;
            const partnerName=b.externalPartner||(partner?getUserName(partner):null);
            return(<div key={b.id} className="booking-row">
              <div className="info">
                <strong>Tavolo {b.table} · {SLOTS[b.slot]}</strong>
                {formatDate(d)}<br/>
                {partnerName?<>Partner: <strong style={{color:"#e8f0ff"}}>{partnerName}</strong></>:b.openInvite?"Posto aperto":"In attesa risposta"}
                <span style={{marginLeft:8}} className={`badge badge-${b.status==="confirmed"?"mine":"pending"}`}>{b.status==="confirmed"?"Confermata":"In attesa"}</span>
              </div>
              <button className="btn-danger" onClick={()=>handleCancel(b.id)}>Cancella</button>
            </div>);
          })}
        </div>}
      </div>}

      {tab==="giocatori"&&<div className="admin-section">
        <h3>Giocatori</h3>
        <div className="my-bookings-list">
          {users.filter(u=>!u.isAdmin).map(u=>{
            const hasPlayed=bookings.some(b=>b.status==="confirmed"&&((b.player1===currentUser.id&&b.player2===u.id)||(b.player2===currentUser.id&&b.player1===u.id)));
            const futureBookings=bookings.filter(b=>(b.player1===u.id||b.player2===u.id)&&new Date(b.date+"T23:59:00")>=new Date());
            return(
              <div key={u.id} className="booking-row" style={{flexDirection:"column",alignItems:"flex-start",gap:8}}>
                <div style={{display:"flex",justifyContent:"space-between",width:"100%",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {u.photo?<img src={u.photo} style={{width:32,height:32,borderRadius:"50%",objectFit:"cover"}}/>:<div style={{width:32,height:32,borderRadius:"50%",background:"#1a2d50",display:"flex",alignItems:"center",justifyContent:"center",color:"#2d7dd2",fontWeight:700,fontSize:".9rem"}}>{u.name[0].toUpperCase()}</div>}
                    <strong style={{color:"#e8f0ff",fontSize:".95rem"}}>{u.name}{u.id===currentUser.id&&<span style={{fontSize:".7rem",color:"#4a6a8a",marginLeft:4}}>(tu)</span>}</strong>
                  </div>
                  {hasPlayed&&u.id!==currentUser.id&&<span className="badge badge-mine" style={{fontSize:".7rem"}}>✓ Già giocato insieme</span>}
                </div>
                {futureBookings.length>0?(
                  <div style={{fontSize:".78rem",color:"#4a6a8a",width:"100%"}}>
                    <div style={{marginBottom:4,color:"#8ab0d4",fontWeight:600}}>Prossimi allenamenti:</div>
                    {futureBookings.slice(0,3).map(b=>(
                      <div key={b.id} style={{padding:"4px 0",borderBottom:"1px solid #0d1a35"}}>
                        🏓 Tavolo {b.table} · {SLOTS[b.slot]} · {new Date(b.date+"T12:00:00").toLocaleDateString("it-IT",{weekday:"short",day:"2-digit",month:"2-digit"})}
                      </div>
                    ))}
                  </div>
                ):<div style={{fontSize:".78rem",color:"#2a3d5a"}}>Nessun allenamento prenotato</div>}
              </div>
            );
          })}
          {users.filter(u=>!u.isAdmin).length===0&&<div className="empty-state">Nessun membro ancora.</div>}
        </div>
      </div>}

      {tab==="admin"&&currentUser.isAdmin&&<div className="admin-section">
        <h3>Pannello Admin</h3>
        <div className="section-title" style={{marginTop:0}}>Admin ({users.filter(u=>u.isAdmin).length})</div>
        <table className="admin-table">
          <thead><tr><th>Nome</th><th>Email</th></tr></thead>
          <tbody>{users.filter(u=>u.isAdmin).map(u=>(
            <tr key={u.id}>
              <td><div style={{display:"flex",alignItems:"center",gap:8}}>{u.photo?<img src={u.photo} style={{width:24,height:24,borderRadius:"50%",objectFit:"cover"}}/>:<div style={{width:24,height:24,borderRadius:"50%",background:"#1a2d50",display:"flex",alignItems:"center",justifyContent:"center",color:"#2d7dd2",fontWeight:700,fontSize:".75rem"}}>{u.name[0].toUpperCase()}</div>}<strong>{u.name}</strong></div></td>
              <td>{u.email}</td>
            </tr>
          ))}</tbody>
        </table>
        <div className="section-title">Giocatori ({users.filter(u=>!u.isAdmin).length})</div>
        <table className="admin-table">
          <thead><tr><th>Nome</th><th>Email</th><th></th></tr></thead>
          <tbody>{users.filter(u=>!u.isAdmin).map(u=>(
            <tr key={u.id}>
              <td><div style={{display:"flex",alignItems:"center",gap:8}}>{u.photo?<img src={u.photo} style={{width:24,height:24,borderRadius:"50%",objectFit:"cover"}}/>:<div style={{width:24,height:24,borderRadius:"50%",background:"#1a2d50",display:"flex",alignItems:"center",justifyContent:"center",color:"#2d7dd2",fontWeight:700,fontSize:".75rem"}}>{u.name[0].toUpperCase()}</div>}<strong>{u.name}</strong></div></td>
              <td>{u.email}</td>
              <td>{u.id!==currentUser.id&&<button className="btn-danger" onClick={async()=>{const newData={...data,users:users.filter(x=>x.id!==u.id),bookings:bookings.filter(b=>b.player1!==u.id&&b.player2!==u.id)};await updateData(newData);}}>Rimuovi</button>}</td>
            </tr>
          ))}</tbody>
        </table>
        <div className="section-title">Prenotazioni ({bookings.length})</div>
        {bookings.length===0?<div className="empty-state">Nessuna prenotazione.</div>:
        <table className="admin-table">
          <thead><tr><th>Tavolo</th><th>Data</th><th>Turno</th><th>Giocatori</th><th>Stato</th><th></th></tr></thead>
          <tbody>{[...bookings].sort((a,b)=>a.date.localeCompare(b.date)).map(b=>(
            <tr key={b.id}>
              <td><strong>{b.table}</strong></td>
              <td>{new Date(b.date+"T12:00:00").toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"})}</td>
              <td>{SLOTS[b.slot]}</td>
              <td>{getUserName(b.player1)}{b.externalPartner?" · "+b.externalPartner:b.player2?" · "+getUserName(b.player2):" · —"}</td>
              <td><span className={`badge badge-${b.status==="confirmed"?"mine":"pending"}`}>{b.status==="confirmed"?"Confermata":"In attesa"}</span></td>
              <td><button className="btn-danger" onClick={async()=>{await updateData({...data,bookings:bookings.filter(x=>x.id!==b.id)});}}>Cancella</button></td>
            </tr>
          ))}</tbody>
        </table>}
      </div>}
    </div>

    {profileModal&&<div className="overlay" onClick={()=>setProfileModal(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>Il tuo profilo</h2>
        <div style={{textAlign:"center",marginBottom:16}}>
          {(editPhoto||currentUser.photo)?
            <img src={editPhoto||currentUser.photo} style={{width:80,height:80,borderRadius:"50%",objectFit:"cover",border:"3px solid #2d7dd2"}}/>
            :<div style={{width:80,height:80,borderRadius:"50%",background:"#1a2d50",display:"flex",alignItems:"center",justifyContent:"center",color:"#2d7dd2",fontWeight:800,fontSize:"2rem",margin:"0 auto",border:"3px solid #2d7dd2"}}>{currentUser.name[0].toUpperCase()}</div>
          }
          <div style={{marginTop:10}}>
            <label style={{background:"#2d7dd2",color:"#070d1f",padding:"6px 14px",borderRadius:8,fontSize:".82rem",fontWeight:700,cursor:"pointer"}}>
              📷 Cambia foto
              <input type="file" accept="image/*" onChange={handlePhotoUpload} style={{display:"none"}}/>
            </label>
            {(editPhoto||currentUser.photo)&&<button onClick={()=>setEditPhoto("")} style={{marginLeft:8,background:"none",border:"1px solid #5c2a2a",color:"#de4c4c",borderRadius:8,padding:"6px 10px",fontSize:".78rem",cursor:"pointer"}}>Rimuovi</button>}
          </div>
        </div>
        <label className="field-label" style={{color:"#4a6a8a"}}>Nome</label>
        <input value={editName} onChange={e=>setEditName(e.target.value)} style={{width:"100%",background:"#070d1f",border:"1px solid #1a2d50",borderRadius:8,padding:"10px 12px",color:"#e8f0ff",fontSize:".9rem",marginBottom:14,outline:"none",fontFamily:"Inter,sans-serif"}}/>
        <div className="modal-actions">
          <button className="btn-secondary" onClick={()=>setProfileModal(false)}>Annulla</button>
          <button className="btn-primary" onClick={handleSaveProfile} disabled={!editName.trim()}>Salva</button>
        </div>
      </div>
    </div>}

    {modal&&<div className="overlay" onClick={()=>setModal(null)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h2>Prenota Tavolo {modal.tableNum}</h2>
        <p>{formatDate(dates[selectedDate])} · {SLOTS[selectedSlot]}</p>
        <label>Come vuoi giocare?</label>
        <div className="slot-toggle" style={{marginBottom:14,flexWrap:"wrap"}}>
          <button className={`slot-btn ${inviteMode==="open"?"active":""}`} onClick={()=>setInviteMode("open")}>Posto aperto</button>
          <button className={`slot-btn ${inviteMode==="specific"?"active":""}`} onClick={()=>setInviteMode("specific")}>Invita qualcuno</button>
          <button className={`slot-btn ${inviteMode==="external"?"active":""}`} onClick={()=>setInviteMode("external")} style={{marginTop:8}}>Giocatore esterno</button>
        </div>
        {inviteMode==="specific"&&<>
          <label>Scegli il partner</label>
          <select value={inviteTarget} onChange={e=>setInviteTarget(e.target.value)} style={{width:"100%",background:"#070d1f",border:"1px solid #1a2d50",borderRadius:8,padding:"10px 12px",color:"#e8f0ff",fontSize:".9rem",marginBottom:14,outline:"none"}}>
            <option value="">— Seleziona —</option>
            {otherUsers.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
          </select>
          <p style={{fontSize:".78rem",marginTop:-8}}>Il tavolo resterà "In attesa" finché il partner non si unisce.</p>
        </>}
        {inviteMode==="external"&&<>
          <label>Nome e cognome del giocatore esterno</label>
          <input value={externalName} onChange={e=>setExternalName(e.target.value)} placeholder="Es. Marco Bianchi" style={{width:"100%",background:"#070d1f",border:"1px solid #1a2d50",borderRadius:8,padding:"10px 12px",color:"#e8f0ff",fontSize:".9rem",marginBottom:14,outline:"none",fontFamily:"Inter,sans-serif"}}/>
          <p style={{fontSize:".78rem",marginTop:-8}}>Il nome apparirà sul tavolo ma non verrà registrato nell'app.</p>
        </>}
        {inviteMode==="open"&&<p style={{fontSize:".78rem"}}>Il posto sarà visibile come aperto e chiunque potrà unirsi.</p>}
        <div className="modal-actions">
          <button className="btn-secondary" onClick={()=>setModal(null)}>Annulla</button>
          <button className="btn-primary" onClick={handleBook} disabled={(inviteMode==="specific"&&!inviteTarget)||(inviteMode==="external"&&!externalName.trim())}>Conferma</button>
        </div>
      </div>
    </div>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
